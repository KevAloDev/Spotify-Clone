<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Clone</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1DB954;
    --green-dark: #17a349;
    --bg: #121212;
    --bg2: #181818;
    --bg3: #282828;
    --bg4: #333;
    --text: #FFFFFF;
    --text2: #B3B3B3;
    --text3: #6a6a6a;
    --sidebar: 240px;
    --player: 90px;
  }
  body { font-family: 'Circular', 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: var(--sidebar); background: #000; display: flex; flex-direction: column; padding: 24px 0 0; flex-shrink: 0; }
  .logo { padding: 0 24px 28px; }
  .logo svg { width: 130px; height: 40px; }
  .nav-section { padding: 0 8px; margin-bottom: 24px; }
  .nav-item { display: flex; align-items: center; gap: 16px; padding: 10px 16px; border-radius: 4px; cursor: pointer; color: var(--text2); font-size: 14px; font-weight: 700; transition: color 0.1s; }
  .nav-item:hover, .nav-item.active { color: var(--text); }
  .nav-item.active { background: var(--bg3); }
  .nav-icon { width: 24px; height: 24px; flex-shrink: 0; }
  .sidebar-divider { border: none; border-top: 1px solid var(--bg3); margin: 8px 24px; }
  .sidebar-label { padding: 16px 24px 8px; font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; }
  .playlist-list { flex: 1; overflow-y: auto; padding: 0 8px; }
  .playlist-list::-webkit-scrollbar { width: 0; }
  .playlist-item { padding: 8px 16px; font-size: 14px; color: var(--text2); cursor: pointer; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .playlist-item:hover { color: var(--text); background: var(--bg3); }
  .playlist-item.active { color: var(--green); }

  /* Main */
  .main { flex: 1; overflow-y: auto; background: linear-gradient(180deg, #1a3a2a 0%, var(--bg) 340px); }
  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; position: sticky; top: 0; z-index: 10; background: transparent; }
  .nav-arrows { display: flex; gap: 8px; }
  .nav-arrow { width: 32px; height: 32px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; transition: background 0.2s; }
  .nav-arrow:hover { background: rgba(0,0,0,0.9); }
  .user-btn { background: var(--bg3); border: none; border-radius: 23px; color: var(--text); padding: 4px 8px 4px 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; transition: background 0.2s; }
  .user-btn:hover { background: var(--bg4); }
  .user-avatar { width: 28px; height: 28px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }

  /* Hero */
  .hero { display: flex; align-items: flex-end; gap: 24px; padding: 0 32px 24px; }
  .hero-art { width: 232px; height: 232px; background: linear-gradient(135deg, #450af5, #c4efd9); border-radius: 4px; box-shadow: 0 4px 60px rgba(0,0,0,0.5); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .hero-art svg { width: 80px; height: 80px; opacity: 0.8; }
  .hero-info { padding-bottom: 8px; }
  .hero-type { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .hero-title { font-size: 72px; font-weight: 900; line-height: 1; letter-spacing: -2px; margin-bottom: 16px; }
  .hero-meta { font-size: 14px; color: var(--text2); }
  .hero-meta span { color: var(--text); font-weight: 700; }

  /* Controls bar */
  .controls-bar { display: flex; align-items: center; gap: 16px; padding: 24px 32px 16px; }
  .play-btn-lg { width: 56px; height: 56px; background: var(--green); border: none; border-radius: 50%; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, background 0.2s; flex-shrink: 0; }
  .play-btn-lg:hover { background: var(--green-dark); transform: scale(1.06); }
  .icon-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; transition: color 0.2s; display: flex; align-items: center; }
  .icon-btn:hover { color: var(--text); }
  .icon-btn.liked { color: var(--green); }

  /* Track list */
  .track-list { padding: 0 32px 120px; }
  .track-list-header { display: grid; grid-template-columns: 40px 1fr 1fr 80px; gap: 16px; padding: 0 16px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; font-size: 12px; color: var(--text2); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .track-row { display: grid; grid-template-columns: 40px 1fr 1fr 80px; gap: 16px; padding: 8px 16px; border-radius: 4px; cursor: pointer; align-items: center; transition: background 0.1s; }
  .track-row:hover { background: rgba(255,255,255,0.07); }
  .track-row.playing { background: rgba(29,185,84,0.15); }
  .track-num { font-size: 14px; color: var(--text2); text-align: center; display: flex; align-items: center; justify-content: center; height: 40px; }
  .track-row.playing .track-num { color: var(--green); }
  .track-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .track-thumb { width: 40px; height: 40px; border-radius: 2px; flex-shrink: 0; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .track-name { font-size: 15px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-row.playing .track-name { color: var(--green); }
  .track-artist { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-album { font-size: 14px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; align-self: center; }
  .track-duration { font-size: 14px; color: var(--text2); text-align: right; align-self: center; }
  .equalizer { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
  .eq-bar { width: 3px; background: var(--green); border-radius: 1px; animation: eq 0.8s ease-in-out infinite alternate; }
  .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .eq-bar:nth-child(2) { height: 14px; animation-delay: 0.2s; }
  .eq-bar:nth-child(3) { height: 10px; animation-delay: 0.4s; }
  @keyframes eq { from { transform: scaleY(0.4); } to { transform: scaleY(1); } }

  /* Player */
  .player { height: var(--player); background: #181818; border-top: 1px solid var(--bg3); display: flex; align-items: center; padding: 0 16px; gap: 0; flex-shrink: 0; }
  .player-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .player-thumb { width: 56px; height: 56px; background: linear-gradient(135deg, #450af5, #c4efd9); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .player-song { min-width: 0; }
  .player-song-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  .player-song-artist { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .like-small { background: none; border: none; color: var(--text2); cursor: pointer; margin-left: 8px; display: flex; }
  .like-small:hover { color: var(--text); }
  .like-small.liked { color: var(--green); }

  .player-center { flex: 1.4; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .player-controls { display: flex; align-items: center; gap: 16px; }
  .ctrl-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.15s, transform 0.1s; }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.active { color: var(--green); }
  .play-btn-sm { width: 32px; height: 32px; background: var(--text); border: none; border-radius: 50%; color: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
  .play-btn-sm:hover { transform: scale(1.08); }
  .progress-bar { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 520px; }
  .time { font-size: 11px; color: var(--text2); min-width: 36px; }
  .time.right { text-align: right; }
  .progress-track { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; cursor: pointer; position: relative; }
  .progress-fill { height: 100%; background: var(--text2); border-radius: 2px; pointer-events: none; transition: background 0.1s; }
  .progress-track:hover .progress-fill { background: var(--green); }
  .progress-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%) scale(0); width: 12px; height: 12px; background: var(--text); border-radius: 50%; pointer-events: none; transition: transform 0.1s; }
  .progress-track:hover .progress-thumb { transform: translate(-50%, -50%) scale(1); }

  .player-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
  .volume-bar { display: flex; align-items: center; gap: 6px; }
  .vol-track { width: 80px; height: 4px; background: var(--bg4); border-radius: 2px; cursor: pointer; position: relative; }
  .vol-fill { height: 100%; background: var(--text2); border-radius: 2px; pointer-events: none; }
  .vol-track:hover .vol-fill { background: var(--green); }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">

        <path d="M19.5 2C10 2 2 10 2 19.5S10 37 19.5 37 37 29 37 19.5 29 2 19.5 2zm8.96 27.27a1.33 1.33 0 01-1.83.44c-5.01-3.06-11.32-3.75-18.75-2.06a1.33 1.33 0 01-.6-2.59c8.12-1.86 15.09-1.06 20.74 2.38.63.38.83 1.2.44 1.83zm2.39-5.33a1.66 1.66 0 01-2.28.54c-5.73-3.52-14.46-4.54-21.23-2.49a1.66 1.66 0 01-.96-3.18c7.73-2.35 17.35-1.21 23.93 2.85.78.48 1.02 1.5.54 2.28zm.21-5.55C24.4 14.47 13.4 14.1 7.05 16.02a2 2 0 01-1.16-3.83c7.26-2.2 19.32-1.77 26.95 2.8a2 2 0 01-2 3.4z" fill="#1DB954"/>
        <text x="43" y="28" font-family="Arial" font-size="18" font-weight="900" fill="white">Spotify</text>
      </svg>

    <nav class="nav-section">
      <div class="nav-item active" onclick="setNav(this)">

        Tu biblioteca

    </nav>

    <hr class="sidebar-divider">
    <div class="sidebar-label">Playlists</div>
    <div class="playlist-list">
      <div class="playlist-item active" onclick="setPlaylist(this)">Mis favoritas</div>
      <div class="playlist-item" onclick="setPlaylist(this)">Chill vibes</div>
      <div class="playlist-item" onclick="setPlaylist(this)">Workout mix</div>
      <div class="playlist-item" onclick="setPlaylist(this)">Lo-fi study</div>

      <div class="playlist-item" onclick="setPlaylist(this)">Party mode</div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main">
    <div class="topbar">
      <div class="nav-arrows">
        <button class="nav-arrow" title="Atrás">&#8249;</button>
        <button class="nav-arrow" title="Adelante">&#8250;</button>

<!-- Player bar -->
<div class="player">

    <div class="player-song">

      </button>
      <button class="play-btn-sm" id="playBtnSm" onclick="togglePlay()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="playIconSm"><path d="M8 5v14l11-7z"/></svg>

      <button class="ctrl-btn" title="Siguiente" onclick="nextTrack()">

      </button>

      </button>

        <div class="vol-fill" id="volFill" style="width:70%"></div>
      </div>
    </div>
  </div>
</div>

let progress = 0;
let intervalId = null;
let durations = { '3:20':200,'3:23':203,'2:21':141,'3:18':198,'2:58':178,'2:17':137,'3:02':182,'3:29':209,'4:02':242,'3:35':215,'2:58':178 };

function parseDur(s) {
  const [m,sec] = s.split(':').map(Number);
  return m*60 + sec;
}
function fmtTime(s) {
  s = Math.max(0, Math.floor(s));
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function renderTracks() {
  const list = document.getElementById('trackList');
  list.innerHTML = tracks.map(t => `
    <div class="track-row ${currentTrack && currentTrack.id===t.id ? 'playing':''}" onclick="playTrack(${t.id})" id="tr${t.id}">
      <div class="track-num" id="tn${t.id}">
        ${currentTrack && currentTrack.id===t.id && isPlaying
          ? '<div class="equalizer"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>'
          : t.num}
      </div>
      <div class="track-info">
        <div class="track-thumb">${t.emoji}</div>
        <div>
          <div class="track-name">${t.name}</div>
          <div class="track-artist">${t.artist}</div>
        </div>
      </div>
      <div class="track-album">${t.album}</div>
      <div class="track-duration">${t.dur}</div>
    </div>
  `).join('');
}

function playTrack(id) {
  const t = tracks.find(x => x.id === id);
  if (!t) return;
  currentTrack = t;
  isPlaying = true;
  progress = 0;
  updatePlayer();
  renderTracks();
  startProgress();
}

function updatePlayer() {
  if (!currentTrack) return;
  document.getElementById('playerSongName').textContent = currentTrack.name;
  document.getElementById('playerSongArtist').textContent = currentTrack.artist;
  document.getElementById('playerThumb').textContent = currentTrack.emoji;
  document.getElementById('totalTime').textContent = currentTrack.dur;
  updatePlayIcon();
}

function updatePlayIcon() {
  const playPath = '<path d="M8 5v14l11-7z"/>';
  const pausePath = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  document.getElementById('playIconSm').innerHTML = isPlaying ? pausePath : playPath;
  document.getElementById('heroPlayBtn').innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">${isPlaying ? pausePath : playPath}</svg>`;
}

function togglePlay() {
  if (!currentTrack) { playTrack(1); return; }
  isPlaying = !isPlaying;
  if (isPlaying) startProgress(); else stopProgress();
  updatePlayIcon();
  renderTracks();
}

function startProgress() {
  stopProgress();
  const total = parseDur(currentTrack.dur);
  intervalId = setInterval(() => {
    progress += 0.5;
    if (progress >= total) {
      progress = 0;
      if (isRepeat) { startProgress(); return; }
      nextTrack(); return;
    }
    const pct = (progress / total * 100).toFixed(1);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressThumb').style.left = pct + '%';
    document.getElementById('currentTime').textContent = fmtTime(progress);
  }, 500);
}

function stopProgress() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
}

function seekTo(e) {
  const track = document.getElementById('progressTrack');
  const rect = track.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (!currentTrack) return;
  progress = pct * parseDur(currentTrack.dur);
  document.getElementById('progressFill').style.width = (pct*100).toFixed(1)+'%';
  document.getElementById('progressThumb').style.left = (pct*100).toFixed(1)+'%';
  document.getElementById('currentTime').textContent = fmtTime(progress);
}

function nextTrack() {
  if (!currentTrack) return;
  let idx = tracks.findIndex(t => t.id === currentTrack.id);
  idx = isShuffle ? Math.floor(Math.random()*tracks.length) : (idx+1) % tracks.length;
  playTrack(tracks[idx].id);
}

function prevTrack() {
  if (!currentTrack) return;
  let idx = tracks.findIndex(t => t.id === currentTrack.id);
  idx = (idx - 1 + tracks.length) % tracks.length;
  playTrack(tracks[idx].id);
}

function toggleShuffle(btn) {
  isShuffle = !isShuffle;
  document.getElementById('shuffleSmall').classList.toggle('active', isShuffle);
}
function toggleRepeat(btn) {
  isRepeat = !isRepeat;
  document.getElementById('repeatSmall').classList.toggle('active', isRepeat);
}
function toggleLikeCurrent() {
  if (!currentTrack) return;
  if (liked.has(currentTrack.id)) liked.delete(currentTrack.id);
  else liked.add(currentTrack.id);
  document.getElementById('likeSmall').classList.toggle('liked', liked.has(currentTrack.id));
}
function setVolume(e) {
  const rect = document.getElementById('volTrack').getBoundingClientRect();
  volume = Math.max(0, Math.min(100, Math.round((e.clientX - rect.left) / rect.width * 100)));
  document.getElementById('volFill').style.width = volume + '%';
  isMuted = volume === 0;
}
function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('volFill').style.width = isMuted ? '0%' : volume+'%';
}
function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
function setPlaylist(el) {
  document.querySelectorAll('.playlist-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

renderTracks();
</script>
</body>
</html>
